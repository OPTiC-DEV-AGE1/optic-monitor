<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Top Reports · OPTiC Monitor</title>
<meta name="description" content="The most viewed Evony scout and battle reports shared through OPTiC Monitor - today and this week.">
<meta name="theme-color" content="#0a0d13">
<meta property="og:type" content="website">
<meta property="og:title" content="Top Reports · OPTiC Monitor">
<meta property="og:description" content="The most viewed Evony scout and battle reports, today and this week.">
<style>
  :root{
    --bg:#0a0d13; --panel:#111823; --panel2:#0e141d; --bg2:#0d1119;
    --border:#222c38; --border2:#2c3846;
    --txt:#e9eef5; --dim:#8b98a8; --dim2:#5c6775;
    --grn:#3fb950; --grn-b:#57e06a; --gold:#f5c518;
    --red:#f85149; --amber:#d29922; --blue:#58a6ff; --purple:#bc8cff;
    --mono:"Cascadia Code","SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.6;
    -webkit-font-smoothing:antialiased;padding:0 0 60px;
    background-image:radial-gradient(1100px 520px at 80% -12%,rgba(63,185,80,.09),transparent 60%),
                     radial-gradient(820px 460px at 0% 6%,rgba(245,197,24,.05),transparent 55%);
    background-attachment:fixed}
  .wrap{max-width:960px;margin:0 auto;padding:0 20px}
  .num{font-variant-numeric:tabular-nums;font-family:var(--mono)}

  header{border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(10,13,19,.95),rgba(10,13,19,.6));
    backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
  .bar{display:flex;align-items:center;gap:12px;height:56px}
  .logo{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex-shrink:0;
    background:linear-gradient(150deg,#132417,#0c1a10);border:1px solid #234d2c;position:relative}
  .logo::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--grn-b);
    box-shadow:0 0 10px var(--grn-b),0 0 3px #fff inset}
  .brand{font-weight:900;letter-spacing:.14em;font-size:14px;color:var(--txt);text-decoration:none}
  .sp{flex:1}
  .navlink{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--dim);text-decoration:none;padding:4px 10px;border-radius:100px;border:1px solid transparent}
  .navlink:hover{color:var(--grn-b);border-color:var(--border2)}
  .navlink:focus-visible{outline:2px solid var(--grn);outline-offset:2px}

  .head{margin-top:30px;margin-bottom:20px}
  h1{font-size:clamp(23px,4.4vw,32px);font-weight:800;letter-spacing:-.02em;line-height:1.15;
    margin-bottom:8px;text-wrap:balance}
  .lead{color:var(--dim);font-size:14.5px;max-width:60ch}

  .tabs{display:inline-flex;border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin:18px 0 4px}
  .tabs button{font-family:var(--sans);font-size:13px;font-weight:700;padding:9px 20px;cursor:pointer;
    background:transparent;border:0;color:var(--dim);transition:background .15s,color .15s}
  .tabs button[aria-selected="true"]{background:var(--panel);color:var(--grn-b)}
  .tabs button:focus-visible{outline:2px solid var(--grn);outline-offset:-2px}
  .rankby{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim2);margin-left:12px}

  .list{display:flex;flex-direction:column;gap:11px;margin-top:16px}
  .card{display:flex;gap:15px;align-items:flex-start;text-decoration:none;color:inherit;
    background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border2);
    border-radius:13px;padding:15px 17px;transition:border-color .16s,transform .1s;
    box-shadow:0 24px 50px -34px rgba(0,0,0,.8)}
  .card:hover{border-color:#3b4a5c}
  .card:active{transform:translateY(1px)}
  .card:focus-visible{outline:2px solid var(--grn);outline-offset:2px}
  .rank{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--dim2);
    min-width:30px;text-align:right;padding-top:1px;font-variant-numeric:tabular-nums}
  .card.top .rank{color:var(--gold)}
  .body{flex:1;min-width:0}
  .ln1{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:3px}
  .chip{font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;
    padding:3px 8px;border-radius:100px;border:1px solid var(--border2);color:var(--dim)}
  .chip.scout{color:var(--blue);border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.08)}
  .chip.battle{color:var(--red);border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
  .title{font-size:15px;font-weight:650;letter-spacing:-.01em;overflow-wrap:anywhere}
  .sub{font-size:12.5px;color:var(--dim);overflow-wrap:anywhere}
  .facts{display:flex;gap:16px;flex-wrap:wrap;margin-top:7px}
  .fact{font-size:12px;color:var(--dim2)}
  .fact b{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;
    color:var(--txt);font-size:12.5px;margin-left:5px}
  .fact b.neg{color:var(--red)} .fact b.pos{color:var(--grn-b)}
  .meta{text-align:right;flex-shrink:0}
  .views{font-family:var(--mono);font-size:15px;font-variant-numeric:tabular-nums;color:var(--txt)}
  .vlab{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim2)}
  .ago{font-size:11px;color:var(--dim2);margin-top:5px;white-space:nowrap}

  .state{border:1px dashed var(--border2);border-radius:13px;padding:38px 24px;text-align:center;margin-top:16px}
  .state h2{font-size:17px;font-weight:700;margin-bottom:7px;letter-spacing:-.01em}
  .state p{color:var(--dim);font-size:13.5px;max-width:48ch;margin:0 auto 5px}
  .state a{color:var(--grn-b)}
  .state.bad{border-style:solid;border-color:rgba(210,153,34,.35);background:rgba(210,153,34,.06)}
  .state.bad h2{color:var(--amber)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--grn-b);
    margin-right:8px;vertical-align:middle;animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.dot{animation:none;opacity:.7}.card{transition:none}}

  footer{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--dim2);
    letter-spacing:.1em;margin-top:44px}
  @media(max-width:560px){
    .card{gap:11px;padding:13px;flex-wrap:wrap}
    .rank{min-width:22px;font-size:16px}
    /* The view count is what the ranking means, so it drops to its own line
       rather than being hidden. Indented to clear the rank column. */
    .meta{width:100%;text-align:left;padding-left:33px;margin-top:2px;
      display:flex;gap:7px;align-items:baseline}
    .views{font-size:13px}
    .ago{margin-top:0}
    .ago::before{content:"·";margin-right:7px;color:var(--border2)}
    /* beside the tabs this wraps mid-phrase - give it its own line */
    .rankby{display:block;margin:8px 0 0}
  }
</style>
</head>
<body>
<header><div class="wrap bar">
  <span class="logo"></span><a class="brand" href="/">OPTiC</a>
  <span class="sp"></span>
  <a class="navlink" href="/">Home</a>
  <a class="navlink" href="/report.html">Report viewer</a>
</div></header>

<div class="wrap">
  <div class="head">
    <h1>Top Reports</h1>
    <p class="lead">The scout and battle reports players chose to share publicly, ranked by the number
       of troops destroyed. Unlisted reports never appear here.</p>

    <div class="tabs" role="tablist" aria-label="Time window">
      <button role="tab" id="tabDay"  aria-selected="true"  onclick="load('day')">Today</button>
      <button role="tab" id="tabWeek" aria-selected="false" onclick="load('week')">This week</button>
    </div>
    <span class="rankby" id="rankby">ranked by troops killed</span>
  </div>

  <div id="out"></div>
</div>

<footer>OPTiC ACCOUNT MONITOR &middot; TOP REPORTS</footer>

<script>
var FEED="https://script.google.com/macros/s/AKfycbxpZH6yPQIOWFHsixIKf9JMvjHRxbmgNiZ2cBLUbskXu7cnMoj79qOu_3YzNtrY9pHKsw/exec";
var LIMIT=25;
var cache={};            // window -> reports, so flipping tabs does not refetch
var current="day";

function el(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function n(v){var x=Number(v);return isFinite(x)?x.toLocaleString("en-US"):esc(v);}

function ago(iso){
  var t=Date.parse(iso);
  if(!isFinite(t))return "";
  var s=Math.max(0,(Date.now()-t)/1000);
  if(s<90)return "just now";
  var m=Math.round(s/60);      if(m<60) return m+"m ago";
  var h=Math.round(m/60);      if(h<48) return h+"h ago";
  return Math.round(h/24)+"d ago";
}

/* A battle headline reads as the matchup; a scout headline reads as the target.
   Falling back to the code keeps a row legible even when the app that published
   it sent no context at all. */
function headline(r){
  var s=r.summary||{};
  if(r.kind==="battle"){
    var a=s.attacker||"Unknown", d=s.defender||"Unknown";
    return esc(a)+" <span style='color:var(--dim2)'>vs</span> "+esc(d);
  }
  return esc(r.city||r.player||("Report "+r.code));
}

function subline(r){
  var s=r.summary||{},bits=[];
  if(r.kind==="battle"){
    if(s.atkHero)bits.push(esc(s.atkHero)+(s.atkLevel?" &middot; lv "+esc(s.atkLevel):""));
    if(r.coords)bits.push(esc(r.coords));
  }else{
    if(r.player)bits.push(esc(r.player));
    if(r.alliance)bits.push("["+esc(r.alliance)+"]");
    if(r.coords)bits.push(esc(r.coords));
  }
  if(r.server)bits.push(esc(r.server));
  return bits.join(" &middot; ");
}

function facts(r){
  var s=r.summary||{},out=[];
  function add(label,val,cls){
    if(val===""||val==null)return;
    out.push("<span class='fact'>"+label+"<b"+(cls?" class='"+cls+"'":"")+">"+val+"</b></span>");
  }
  if(r.kind==="battle"){
    add("Rounds",s.rounds!=null&&s.rounds!==""?n(s.rounds):"");
    if(s.honor!=null&&s.honor!=="")
      add("Honor",(Number(s.honor)>0?"+":"")+n(s.honor),Number(s.honor)<0?"neg":"pos");
    var lost=0,any=false;
    (s.atkTroops||[]).forEach(function(u){lost+=Number(u.lost)||0;any=true;});
    if(any)add("Attacker lost",n(lost),lost?"neg":"");
    if(s.attackWon===true||s.attackWon===false)
      add("Result",s.attackWon?"Attack won":"Held",s.attackWon?"neg":"pos");
  }else{
    if(s.gold!=null&&s.gold!=="")add("Gold",n(s.gold));
    if(s.population!=null&&s.population!=="")add("Population",n(s.population));
    if(s.support!=null&&s.support!=="")add("Loyalty",n(s.support));
  }
  return out.join("");
}

function card(r,i){
  return "<a class='card"+(i===0?" top":"")+"' href='/"+encodeURIComponent(r.code)+"'>"+
    "<div class='rank'>"+(i+1)+"</div>"+
    "<div class='body'>"+
      "<div class='ln1'><span class='chip "+(r.kind==="battle"?"battle":"scout")+"'>"+
        (r.kind==="battle"?"Battle":"Scout")+"</span>"+
        "<span class='title'>"+headline(r)+"</span></div>"+
      "<div class='sub'>"+subline(r)+"</div>"+
      "<div class='facts'>"+facts(r)+"</div>"+
    "</div>"+
    "<div class='meta'><div class='views'>"+n(r.kills||0)+"</div>"+
      "<div class='vlab'>killed</div><div class='ago'>"+esc(ago(r.time))+"</div></div>"+
  "</a>";
}

function empty(win){
  return "<div class='state'><h2>No battles "+(win==="week"?"this week":"today")+" yet</h2>"+
    "<p>Battle reports land here as soon as someone opens one, ranked by troops killed. "+
    "Open one in the <a href='/report.html'>viewer</a> and it is in &mdash; there is nothing else to press. "+
    "Scout reports are not ranked here.</p>"+
    (win==="day"?"<p style='margin-top:9px'>Try <a href='#' onclick=\"load('week');return false\">this week</a> for a wider window.</p>":"")+
    "</div>";
}

function load(win){
  current=win;
  el("tabDay").setAttribute("aria-selected",String(win==="day"));
  el("tabWeek").setAttribute("aria-selected",String(win==="week"));

  if(cache[win]){render(cache[win],win);return;}
  el("out").innerHTML="<div class='state'><h2><span class='dot'></span>Loading</h2>"+
    "<p>Fetching the "+(win==="week"?"week":"day")+"&rsquo;s reports.</p></div>";

  fetch(FEED+"?feed="+win+"&limit="+LIMIT,{cache:"no-store"})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(j){
      if(!j||j.result!=="success")throw new Error((j&&j.msg)||"bad response");
      // Battles only. This board ranks by troops killed, and a scout report
      // kills nothing - it would sit at the bottom forever taking up room. It
      // is also somebody's city intel, which is a different thing to publish
      // on a leaderboard than a fight you chose to have. Scout reports still
      // share and open normally; they just do not get ranked.
      var list=(j.reports||[]).filter(function(r){return r.kind==="battle";});
      cache[win]=list;
      // A late reply for a tab the reader already left must not overwrite it.
      if(current===win)render(list,win);
    })
    .catch(function(e){
      if(current!==win)return;
      el("out").innerHTML="<div class='state bad'><h2>Could not load the feed</h2>"+
        "<p>"+esc(e.message)+"</p>"+
        "<p style='margin-top:9px'>Share links still work &mdash; this only affects the ranking.</p></div>";
    });
}

function render(list,win){
  el("rankby").textContent=list.length?("ranked by troops killed · "+list.length+" battle"+(list.length===1?"":"s")):"";
  el("out").innerHTML=list.length
    ? "<div class='list'>"+list.map(card).join("")+"</div>"
    : empty(win);
}

load("day");
</script>
</body>
</html>
